name: 'CI macOS: wav → text'
on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/transcribe_wavefile.py'
      - 'scripts/py/func/checks/test_audio_16k_en.wav'
      - '.github/workflows/mac_wav2text.yml'

jobs:
  test-transcription-tool:
    runs-on: macos-latest
    steps:
      - name: '1. Checkout Repository'
        uses: actions/checkout@v4

      - name: '2. Cache models and tools'
        id: assets-cache
        uses: actions/cache@v4
        with:
          path: |
            ./tools/
            ./LanguageTool-6.6
            ./models/
          key: ${{ runner.os }}-models-tools-${{ hashFiles('**/setup/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-models-tools-

      - name: '3. Install Xcode Command Line Tools'
        run: xcode-select --install || true

      - name: '4. Install Homebrew'
        run: |
          if ! command -v brew &> /dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

      - name: '5. Install Pygame dependencies via Homebrew'
        run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf portmidi ffmpeg

      - name: '6. Run macos_setup.sh'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./setup/macos_setup.sh
          ./setup/macos_setup.sh

      - name: '7. Run Transcription and Verify Output'
        run: |
          echo "INFO: Running transcription test..."
          .venv/bin/python tools/transcribe_wavefile.py \
            scripts/py/func/checks/test_audio_16k_en.wav \
            --vosk_model vosk-model-small-en-us-0.15 | grep "the first test sequence is now complete ready to proceed with the second phase"

