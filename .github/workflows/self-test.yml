name: Self-Test (Aura Logic)
# .github/workflows/self-test.yml
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
      - '**.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  pull-requests: write
  contents: read
jobs:
  run-self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@v2

      - name: Cache models and tools
        uses: actions/cache@v4
        with:
          path: |
            ./tools/
            ./LanguageTool-6.6
            ./models/
          key: ${{ runner.os }}-models-tools-${{ hashFiles('**/setup/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-models-tools-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Update apt repositories
        run: sudo apt-get update -y

      - name: Prepare Bootstrap Pointer (The Master Key)
        run: |
          sudo mkdir -p /tmp/sl5_aura
          sudo chmod -R 777 /tmp/sl5_aura
          echo "${{ github.workspace }}" > /tmp/sl5_aura/sl5net_aura_project_root
          cp config/settings_local.py_Example.txt config/settings_local.py


      - name: Run Official Ubuntu Setup
        run: bash ./setup/ubuntu_setup.sh

      - name: Install Additional Test Dependencies
        run: |
          sudo apt-get install -y xvfb xclip


      - name: Start LanguageTool Server
        run: |
          java -cp LanguageTool-6.6/languagetool-server.jar org.languagetool.server.HTTPServer --port 8082 --allow-origin "*" &
          sleep 10


      - name: Initialize Eco-CI
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement

      - name: Run Self-Tester with Final Guard
        env:
          PYTHONPATH: ${{ github.workspace }}
          CI: "true"
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1024x768x24 &

          START_TIME=$(date +%s.%N)

          ./.venv/bin/python3 -m scripts.py.func.checks.self_tester | tee test_results.log

          END_TIME=$(date +%s.%N)
          DURATION=$(awk "BEGIN {print $END_TIME - $START_TIME}")

          TESTS_PASSED=$(grep -oP 'Passed: all \K[0-9]+' test_results.log || echo "unknown")

          if [ "$TESTS_PASSED" != "0" ] && [ "$TESTS_PASSED" != "" ]; then
            TIME_PER_TEST=$(awk "BEGIN {printf \"%.2f\", $DURATION / $TESTS_PASSED}")
          else
            TIME_PER_TEST="0"
          fi

          echo "TESTS_PASSED=$TESTS_PASSED" >> $GITHUB_ENV
          echo "TIME_PER_TEST=$TIME_PER_TEST" >> $GITHUB_ENV



          if grep -q "| 0 not passed" test_results.log; then
            echo "✅ Final Guard: Success summary found. 0 tests failed."
          else
            echo "❌ FINAL GUARD FAILURE: Success summary '| 0 failed' not found!"
            exit 1
          fi

      - name: Measure Core Logic Tests
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: "Aura Core Logic (${{ env.TESTS_PASSED }} Tests, avg ${{ env.TIME_PER_TEST }}s/test)"

      - name: Display and Send Energy Results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          pr-comment: true
          send-data: true
          calculate-co2: false  # External CO2 data often unavailable for GH runners

      - name: Package Assets as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sl5-assets-pack-ubuntu-tester
          path: |
            ./LanguageTool-6.6
            ./models/

