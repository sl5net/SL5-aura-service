name: Self-Test (Aura Logic)
# .github/workflows/self-test.yml

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  run-self-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4


      - name: Prepare Temp Directory and Config
        run: |
          sudo mkdir -p /tmp/sl5_aura
          sudo chmod -R 777 /tmp/sl5_aura
          
          sudo mkdir -p $GITHUB_WORKSPACE/log
          sudo chmod -R 777 $GITHUB_WORKSPACE/log
          
          echo "${{ github.workspace }}" > /tmp/sl5_aura/sl5net_aura_project_root
          # echo "$GITHUB_WORKSPACE" > /tmp/sl5_aura/sl5net_aura_project_root
          echo "✅ Temp-Datei erstellt für Top-Level Importe."


          if [ -f "config/maps/plugins/standard_actions/language_translator/de-DE/FUZZY_MAP_pre.py" ]; then
            echo "✅ German Fuzzy Map found."
          else
            echo "❌ German Fuzzy Map MISSING at config/maps/plugins/standard_actions/language_translator/de-DE/FUZZY_MAP_pre.py"
            exit 1
          fi


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportaudio2 fzf xclip

      - name: Install Python Dependencies

        run: |
          python3 -m pip install --upgrade pip
          # Wir installieren die Kern-Abhängigkeiten explizit, falls sie in requirements.txt fehlen
          python3 -m pip install psutil numpy pygame requests

          # Falls vorhanden, den Rest aus den requirements laden
          if [ -f requirements.txt ]; then python3 -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python3 -m pip install -r requirements-dev.txt; fi

      - name: Verify Cache Status
        run: |
          if [ -d "./LanguageTool-6.6" ]; then
            echo "✅ LanguageTool directory exists (Restored from Cache or Downloaded)."
          else
            echo "❌ LanguageTool directory MISSING!"
            exit 1
          fi

      - name: Cache LanguageTool
        id: lt-cache
        uses: actions/cache@v4
        with:
          path: ./LanguageTool-6.6
          key: ${{ runner.os }}-languagetool-6.6

      - name: Download LanguageTool if cache miss
        if: steps.lt-cache.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/sl5net/SL5-aura-service/releases/download/v0.2.0.1/LanguageTool-6.6.zip
          unzip LanguageTool-6.6.zip

      - name: Start LanguageTool Server
        run: |
          java -cp LanguageTool-6.6/languagetool-server.jar org.languagetool.server.HTTPServer --port 8082 --allow-origin "*" &
          echo "Waiting for LanguageTool..."
          sleep 50

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip

          pip install "numpy>=2.0.0"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Prepare Temp Directory and Project Root File
        run: |
          sudo mkdir -p /tmp/sl5_aura
          sudo chmod -R 777 /tmp/sl5_aura

          printf '%s' "$GITHUB_WORKSPACE" > /tmp/sl5_aura/sl5net_aura_project_root

          touch scripts/__init__.py
          touch scripts/py/__init__.py
          touch scripts/py/func/__init__.py
          touch scripts/py/func/checks/__init__.py

          cp config/settings_local.py_Example.txt config/settings_local.py

          echo "✅ /tmp/sl5_aura/sl5net_aura_project_root created as file."


      - name: Run Self-Tester
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
          CI: "true"
          PSUTIL_DEBUG: "0"
        run: |
          echo "=== DEBUG ==="
          cat /tmp/sl5_aura/sl5net_aura_project_root
          ls "$(cat /tmp/sl5_aura/sl5net_aura_project_root)/config/maps/plugins/standard_actions/language_translator/de-DE/" 2>&1 || echo "MAP PATH NOT FOUND"
          echo "=== END DEBUG ==="
          python3 -m scripts.py.func.checks.self_tester

