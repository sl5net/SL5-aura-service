name: Self-Test (Aura Logic)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  run-self-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=2.1.0"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Java (for LanguageTool)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install and Start LanguageTool
        run: |
          wget https://languagetool.org/download/LanguageTool-6.4.zip
          unzip LanguageTool-6.4.zip
          # Startet LT im Hintergrund auf Port 8082
          java -cp LanguageTool-6.4/languagetool-server.jar org.languagetool.server.HTTPServer --port 8082 --allow-origin "*" &
          echo "Waiting for LanguageTool..."
          sleep 15

      - name: Prepare Temp Directories and Mock Config
        run: |
          # Dein Script erwartet bestimmte Dateien in /tmp
          sudo mkdir -p /tmp/sl5_aura/sl5net_aura_project_root
          sudo chmod -R 777 /tmp/sl5_aura
          echo "$GITHUB_WORKSPACE" > /tmp/sl5_aura/sl5net_aura_project_root

          mkdir -p config/maps/plugins/standard_actions/language_translator/de-DE/

      - name: Run Self-Tester
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Wir rufen direkt den __main__ Block deines Scripts auf
          python scripts/py/func/checks/self_tester.py
