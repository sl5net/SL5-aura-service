# ubuntu_wav2text.yml
# File: .github/workflows/transcription_tool_test.yml

name: 'ubuntu_wav2text.yml'

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/transcribe_wavefile.py'
      - 'scripts/py/func/checks/test_audio_16k_en.wav'
      - '.github/workflows/ubuntu_wav2text.yml'


jobs:
  test-transcription-tool:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install CI Display Dependencies
        run: |
          sudo apt-get update
          # xclip für das Clipboard, libnotify-bin für notify-send, xvfb für den virtuellen Screen
          sudo apt-get install -y xclip libnotify-bin xvfb dbus-x11

      - name: '1. Checkout Repository'
        uses: actions/checkout@v4

      - name: '2. Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: '3. Install Python Dependencies'
        run: pip install -r requirements.txt

      - name: '4. Install System Dependencies'
        # This step runs every time to ensure tools are present
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libnotify-bin xclip xvfb

      - name: '5. Cache Vosk Model'
        id: cache-vosk-model
        uses: actions/cache@v4
        with:
          # Correct path for the cache
          path: models
          key: ${{ runner.os }}-vosk-model-small-en-us-0.15

      - name: '6a. Download Vosk model'
        if: steps.cache-vosk-model.outputs.cache-hit != 'true'
        run: |
          chmod +x ./setup/ubuntu_setup.sh
          ./setup/ubuntu_setup.sh

      - name: '6b. Set up Python venv (always)'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
            

      - name: '7. Run Transcription and Verify Output'
        run: |
          echo "INFO: Verifying test files..."
          if [ ! -f "scripts/py/func/checks/test_audio_16k_en.wav" ]; then
            echo "ERROR: Audio file not found!"
            exit 1
          fi
                  
          echo "INFO: Running transcription test..."
          
          set +e

          # 7.1. Run the script and capture output to a temporary file
          # This ensures we see the errors even if grep fails later
          # xvfb-run starts the venv, ten starts the command
          
          xvfb-run dbus-run-session -- .venv/bin/python tools/transcribe_wavefile.py \
            scripts/py/func/checks/test_audio_16k_en.wav \
            --vosk_model vosk-model-small-en-us-0.15 > transcription_result.txt 2>&1

          # 7.2. Capture the exit code of the python script
          EXIT_CODE=$?
          set -e # Re-enable exit on error
          
          # 7.3. Print the actual output to the GitHub Action log for debugging
          echo "--- START OF TRANSCRIPTION OUTPUT ---"
          cat transcription_result.txt
          echo "--- END OF TRANSCRIPTION OUTPUT ---"
          
          # 7.4. Check if the script itself crashed
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Transcription script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
                    
          # 7.5. Perform the string check - part only
          # look for a unique part of the phrase only
          if grep -qi "second phase" transcription_result.txt; then
            echo "SUCCESS: Found expected sequence in transcription."
          else
            echo "ERROR: Expected keyword not found in output."
            exit 1
          fi

          # 7.6. Perform the string check
          # look for a unique part of the phrase only
          if grep "the first test sequence is now complete ready to proceed with the second phase" transcription_result.txt; then
            echo "SUCCESS: Found expected transcription."
          else
            echo "ERROR: Expected transcription not found in transcription_result.txt"
            exit 1
          fi

