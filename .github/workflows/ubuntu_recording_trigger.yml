name: CI for ubuntu Setup and Test Service Initialization
on:

  push:
    branches: [ master ]
    paths:
      - 'setup/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/ubuntu_recording_trigger.yml'
  pull_request:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:


jobs:
  # Renamed job for clarity
  validate-ubuntu-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4


      - name: Validate requirements.txt syntax
        run: |
          python3 -c "
          from pip._internal.req import parse_requirements
          from pip._internal.network.session import PipSession
          list(parse_requirements('requirements.txt', session=PipSession()))
          print('requirements.txt syntax is valid')
          "

      - name: Test fresh install of requirements.txt
        run: |
          python3 -m venv /tmp/test_venv
          /tmp/test_venv/bin/pip install -r requirements.txt
          echo "✅ Fresh install successful"





      - name: Cache models and tools
        id: assets-cache
        uses: actions/cache@v4
        with:
          path: |
            ./tools/
            ./LanguageTool-6.6
            ./models/
          key: ${{ runner.os }}-models-tools-${{ hashFiles('**/setup/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-models-tools-
          
      - name: Update apt repositories
        run: sudo apt-get update -y

      - name: Download assets if cache miss
        if: steps.assets-cache.outputs.cache-hit != 'true'
        run: |
          echo "--> Cache not found. Downloading assets from GitHub Release..."
          wget https://github.com/sl5net/SL5-aura-service/releases/download/v0.2.0.1/LanguageTool-6.6.zip
          wget https://github.com/sl5net/SL5-aura-service/releases/download/v0.2.0.1/vosk-model-de-0.21.zip
          wget https://github.com/sl5net/SL5-aura-service/releases/download/v0.2.0.1/vosk-model-en-us-0.22.zip
          mkdir -p models
          mv vosk-model-*.zip models/

      - name: Set CI_DISABLE_AUDIO environment variable
        run: echo "CI=true" >> $GITHUB_ENV

      - name: Run ubuntu_setup.sh (should now use local files)
        run: bash ./setup/ubuntu_setup.sh
        
      - name: Run pre-commit hook (dry-run)
        run: |
          sudo apt-get install -y unix2dos 2>/dev/null || true
          bash ./githooks/pre-commit_BACKUP
          echo "✅ pre-commit hook passed"


      - name: Test Service Initialization
        run: |
          echo "--> Starting service in background..."
          # Start service and redirect its stderr/stdout to a file for live monitoring
          bash ./scripts/restart_venv_and_run-server.sh > service_output.log 2>&1 &
  
          echo "--> Waiting for successful model load..."
          LOG_FILE="log/aura_engine.log"
          
          # Wait up to 100 seconds (20 * 5s) for the final success message
          for i in {1..20}; do
            if grep -q "✅ MODEL READY" "$LOG_FILE"; then
              echo "✅ Success: Service initialized and models are ready."
              # pkill -f aura_engine.py || true # <--- || true HERE to prevent error when service not runs.
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 5
          done
          
          echo "❌ Error: Service did not initialize successfully in time."
          echo "--- Displaying service startup output ---"
          cat service_output.log
          echo "--- Displaying service log for debugging ---"
          cat "$LOG_FILE"
          exit 1


      - name: Package Assets as Artifact(90days available from last run of this workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sl5-assets-pack-ubuntu
          path: |
            ./LanguageTool-6.6
            ./models/


  
