# .github/workflows/suse_setup.yml
name: CI for Suse Setup

on:
  push:
    branches: [ master ]
    paths:
      - 'setup/suse_setup.sh'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/suse_setup.yml'
  pull_request:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate-suse-setup:
    runs-on: ubuntu-latest

    # Pin the tag. "opensuse/leap:latest" silently moved from 15.x to 16.0
    # and broke this job in the past (package names shift between releases).
    # Pinning makes future distro bumps a deliberate, reviewable diff instead
    # of a surprise red build. setup/suse_setup.sh itself now resolves the
    # correct package/compiler names dynamically, so it also stays correct
    # across Leap versions if this tag is bumped later.
    container:
      image: opensuse/leap:16.0

    steps:

      - name: Debug environment
        run: |
          whoami
          id
          command -v sudo || echo "sudo not found (expected: container runs as root)"
          uname -a
          cat /etc/os-release || true

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Cache models and tools
        uses: actions/cache@v6
        with:
          path: |
            ./LanguageTool-6.6
            ./models/
          key: ${{ runner.os }}-suse-models-tools-${{ hashFiles('**/setup/suse_setup.sh') }}
          restore-keys: |
            ${{ runner.os }}-suse-models-tools-

      - name: Run suse_setup.sh
        run: |
          # No sudo needed here: the script itself detects sudo's absence
          # and runs privileged commands directly since this container runs
          # as root. Package/compiler resolution also happens inside the
          # script now, so nothing needs to be patched in from the workflow.
          bash ./setup/suse_setup.sh

      - name: Package Assets as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sl5-assets-pack-suse
          path: |
            ./LanguageTool-6.6
            ./models/
