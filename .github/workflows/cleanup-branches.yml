name: Cleanup Old Branches
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no deletions)'
        type: boolean
        default: true
      max_age_days:
        description: 'Max branch age in days'
        type: number
        default: 120
      min_branches:
        description: 'Minimum branches to keep'
        type: number
        default: 9

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DRY_RUN: ${{ inputs.dry_run != false && inputs.dry_run != 'false' }}
  MAX_AGE_DAYS: ${{ inputs.max_age_days || 180 }}
  MIN_BRANCHES: ${{ inputs.min_branches || 10 }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Delete old branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PROTECTED="^origin/(main|master|develop|staging|feature/wakeword)$"

          # Collect candidate branches (sorted oldest → newest by commit date)
          mapfile -t BRANCHES < <(
            git for-each-ref \
              --sort=committerdate \
              --format='%(refname:short)' \
              refs/remotes/origin/ \
            | grep -vE "$PROTECTED" \
            | sed 's|^origin/||'
          )

          TOTAL=${#BRANCHES[@]}
          echo "Found $TOTAL deletable candidate(s)."

          if [[ "$TOTAL" -le "$MIN_BRANCHES" ]]; then
            echo "Total branches ($TOTAL) ≤ MIN_BRANCHES ($MIN_BRANCHES). Nothing to do."
            exit 0
          fi

          LIMIT=$(( TOTAL - MIN_BRANCHES ))
          NOW=$(date +%s)
          DELETED=0
          SKIPPED=0
          SKIPPED_YOUNG=0

          echo "Evaluating $LIMIT oldest branch(es) for deletion (max age: ${MAX_AGE_DAYS}d)..."
          echo ""

          for BRANCH in "${BRANCHES[@]:0:$LIMIT}"; do
            LAST_COMMIT=$(git log -1 --format=%ct "origin/$BRANCH" 2>/dev/null || echo "0")
            AGE=$(( (NOW - LAST_COMMIT) / 86400 ))

            if [[ "$AGE" -gt "$MAX_AGE_DAYS" ]]; then
              if [[ "$DRY_RUN" == "true" ]]; then
                echo "  [DRY RUN] Would delete: $BRANCH (${AGE}d old)"
              else
                echo "  Deleting: $BRANCH (${AGE}d old)"
                git push origin --delete "$BRANCH"
              fi
              (( DELETED++ )) || true
            else
              echo "  Skipping: $BRANCH (${AGE}d old – under ${MAX_AGE_DAYS}d threshold)"
              (( SKIPPED_YOUNG++ )) || true
            fi
          done

          # Job summary
          {
            echo "## 🌿 Branch Cleanup Summary"
            echo "| | |"
            echo "|---|---|"
            echo "| Mode | $([ "$DRY_RUN" == "true" ] && echo "Dry run ✋" || echo "Live 🗑️") |"
            echo "| Candidates evaluated | $LIMIT |"
            echo "| Deleted (or would delete) | $DELETED |"
            echo "| Skipped (too young) | $SKIPPED_YOUNG |"
            echo "| Age threshold | ${MAX_AGE_DAYS} days |"
            echo "| Min. branches kept | ${MIN_BRANCHES} |"
          } >> "$GITHUB_STEP_SUMMARY"
